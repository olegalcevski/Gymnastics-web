<!doctype html><html lang="mk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ФГСМ — Администрација</title><script src="../app-config.js"></script><style>
:root{--bg:#08111f;--panel:#101d31;--panel2:#14243d;--text:#edf4ff;--muted:#9bb0cc;--brand:#4aa3ff;--ok:#36d399;--bad:#ff6b6b;--border:rgba(255,255,255,.12)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top left,#173964,#08111f 42%,#050913);color:var(--text)}header{padding:22px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:16px;align-items:center;background:rgba(8,17,31,.82);position:sticky;top:0;z-index:10;backdrop-filter:blur(16px)}h1{font-size:20px;margin:0}.wrap{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 78px)}aside{border-right:1px solid var(--border);padding:20px;background:rgba(7,14,25,.72)}main{padding:24px;max-width:1200px}.btn,button{border:0;border-radius:12px;padding:11px 14px;background:var(--brand);color:white;font-weight:700;cursor:pointer}.btn.secondary,button.secondary{background:#223551;color:var(--text)}button.danger{background:#742b35}button.small{padding:7px 10px;border-radius:9px;font-size:12px}.tabs button{display:block;width:100%;margin:0 0 8px;text-align:left;background:transparent;color:var(--muted);border:1px solid var(--border)}.tabs button.active{background:linear-gradient(135deg,#1d5d9e,#183b6a);color:#fff}.card{background:rgba(16,29,49,.86);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:16px;box-shadow:0 20px 60px rgba(0,0,0,.22)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px}input,textarea,select{width:100%;border:1px solid var(--border);border-radius:12px;background:#081527;color:var(--text);padding:11px;font:inherit}textarea{min-height:90px}.muted{color:var(--muted)}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.item{border:1px solid var(--border);border-radius:16px;padding:14px;background:rgba(255,255,255,.035);margin:10px 0}.hide{display:none}.status{font-size:13px}.login{max-width:440px;margin:12vh auto}.pill{font-size:12px;color:#bfe2ff;background:rgba(74,163,255,.15);border:1px solid rgba(74,163,255,.3);padding:5px 8px;border-radius:999px}@media(max-width:820px){.wrap{grid-template-columns:1fr}aside{border-right:0;border-bottom:1px solid var(--border)}.grid{grid-template-columns:1fr}}
</style></head><body>
<header><div><h1>ФГСМ Администрација</h1><div class="muted">Контрола на содржината — Netlify или Zemi</div></div><div class="row"><span id="mode" class="pill"></span><a class="btn secondary" href="../">Отвори веб</a><button id="logout" class="secondary hide">Одјава</button></div></header>
<section id="login" class="login card"><h2>Најава</h2><p class="muted">Внеси ја администраторската лозинка.</p><label>Лозинка</label><input id="password" type="password" autocomplete="current-password"><p><button id="loginBtn">Најави се</button></p><p id="loginMsg" class="status muted"></p></section>
<div id="app" class="wrap hide"><aside><div class="tabs" id="tabs"></div><div class="card"><b>Upload</b><p class="muted">Постави слика/PDF и копирај ја патеката во поле.</p><input id="file" type="file"><p><button id="uploadBtn" class="secondary">Upload</button></p><input id="uploadPath" readonly placeholder="/assets/uploads/..."/></div></aside><main><div class="row" style="justify-content:space-between"><div><h2 id="title"></h2><p id="hint" class="muted"></p></div><button id="newBtn">+ Нова ставка</button></div><section id="editor" class="card hide"><h3 id="editorTitle">Уреди</h3><div id="fields" class="grid"></div><label>JSON payload</label><textarea id="jsonBox" style="min-height:170px;font-family:Consolas,monospace"></textarea><div class="row"><button id="saveBtn">Зачувај</button><button id="cancelBtn" class="secondary">Откажи</button></div><p id="saveMsg" class="status muted"></p></section><section id="list"></section></main></div>
<script>
const cfg=window.APP_CONFIG||{MODE:'static',API_BASE_URL:''}; document.getElementById('mode').textContent=cfg.MODE||'static';
const TYPES={settings:{label:'Почетна/контакт',fields:['hero','featured','calendar','news','goals','contact'],settings:true},news:{label:'Новости',fields:['slug','published','featured','date','category','branch','title','excerpt','body','image','image_alt']},events:{label:'Календар',fields:['slug','published','featured','branch','start_date','end_date','date_label','name','category','type','location','organizer','description','bulletin','registration_url','results_url']},results:{label:'Резултати',fields:['published','featured','date','branch','title','competition_type','category','location','summary','file']},documents:{label:'Документи',fields:['published','featured','title','route','category','description','file']},people:{label:'Луѓе/тела',fields:['published','featured','name','role','body','image']},gallery:{label:'Галерија',fields:['published','featured','title','date','category','image','image_alt']},partners:{label:'Партнери',fields:['published','featured','name','url','logo']},social:{label:'Социјални',fields:['published','featured','platform','title','url','description']},pages:{label:'Страници',fields:['slug','published','title','body']}};
let current='news', data={}, editing=null;
function api(name, qs=''){return (cfg.API_BASE_URL||'') + '/' + name + qs}
async function auth(action,payload){const r=await fetch(api('auth',`?action=${action}`),{method:action==='session'?'GET':'POST',credentials:'include',headers:{'content-type':'application/json'},body:payload?JSON.stringify(payload):undefined}); return r.json();}
async function fetchContent(type){const base=cfg.CONTENT_BASE_URL||api('content'); const sep=base.includes('?')?'&':'?'; const r=await fetch(`${base}${sep}type=${type}`,{credentials:'include',cache:'no-store'}); return r.json();}
async function saveContent(type,method,body){const base=cfg.CONTENT_BASE_URL||api('content'); const sep=base.includes('?')?'&':'?'; const r=await fetch(`${base}${sep}type=${type}`,{method,credentials:'include',headers:{'content-type':'application/json'},body:JSON.stringify(body)}); return r.json();}
function keyOf(x){return x.slug||x.id||x.title||x.name||x.date||''}
function summary(x){return x.title||x.name||x.slug||x.platform||x.category||'Ставка'}
function fieldInput(k,v){ if(typeof v==='boolean') return `<label>${k}</label><select data-f="${k}"><option value="true" ${v?'selected':''}>true</option><option value="false" ${!v?'selected':''}>false</option></select>`; if(typeof v==='object'&&v!==null) return `<label>${k}</label><textarea data-f="${k}">${escapeHtml(JSON.stringify(v,null,2))}</textarea>`; const big=['body','excerpt','description','summary'].includes(k); return `<label>${k}</label><${big?'textarea':'input'} data-f="${k}" value="${big?'':escapeHtml(v??'')}">${big?escapeHtml(v??''):''}</${big?'textarea':'input'}>`;}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
async function load(type=current){current=type; data[type]=await fetchContent(type); render();}
function renderTabs(){tabs.innerHTML=Object.entries(TYPES).map(([k,v])=>`<button class="${k===current?'active':''}" data-t="${k}">${v.label}</button>`).join(''); tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>load(b.dataset.t));}
function render(){renderTabs(); title.textContent=TYPES[current].label; hint.textContent=TYPES[current].settings?'Уреди ја целата settings JSON структура.':'Уреди ставки од content/'+current+'.json'; const payload=data[current]||{}; const items=TYPES[current].settings?[payload]:(payload.items||[]); list.innerHTML=items.map((x,i)=>`<article class="item"><div class="row" style="justify-content:space-between"><div><b>${escapeHtml(summary(x))}</b><div class="muted">${escapeHtml(keyOf(x)||('index '+i))}</div></div><div class="row"><button class="small secondary" data-edit="${i}">Уреди</button>${TYPES[current].settings?'':`<button class="small danger" data-del="${escapeHtml(keyOf(x))}">Избриши</button>`}</div></div></article>`).join('')||'<p class="muted">Нема ставки.</p>'; list.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openEditor(items[+b.dataset.edit]||{}, keyOf(items[+b.dataset.edit]||{}))); list.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delItem(b.dataset.del));}
function openEditor(item={},key=null){editing=key; editor.classList.remove('hide'); editorTitle.textContent=key?'Уреди ставка':'Нова ставка'; const fieldsList=TYPES[current].settings?Object.keys(item):TYPES[current].fields; fields.innerHTML=fieldsList.map(k=>fieldInput(k,item[k]??(k==='published'?true:k==='featured'?false:''))).join(''); jsonBox.value=JSON.stringify(item,null,2); fields.querySelectorAll('[data-f]').forEach(el=>el.oninput=syncJsonFromFields); window.scrollTo({top:0,behavior:'smooth'});}
function syncJsonFromFields(){let obj={}; fields.querySelectorAll('[data-f]').forEach(el=>{let v=el.value; if(v==='true')v=true; else if(v==='false')v=false; else if((v.trim().startsWith('{')||v.trim().startsWith('['))){try{v=JSON.parse(v)}catch{}} obj[el.dataset.f]=v;}); jsonBox.value=JSON.stringify(obj,null,2);}
async function save(){saveMsg.textContent='Се зачувува...'; let item; try{item=JSON.parse(jsonBox.value)}catch(e){saveMsg.textContent='JSON грешка: '+e.message;return;} const method=TYPES[current].settings?'PUT':(editing?'PATCH':'POST'); const body=TYPES[current].settings?{payload:item}:{key:editing,item}; const res=await saveContent(current,method,body); if(!res.ok){saveMsg.textContent=res.error||'Грешка';return;} editor.classList.add('hide'); await load(current);}
async function delItem(key){if(!confirm('Избриши?'))return; await saveContent(current,'DELETE',{key}); await load(current);}
async function upload(){const f=file.files[0]; if(!f)return; if(cfg.MODE==='zemi'){const fd=new FormData(); fd.append('file',f); const r=await fetch(cfg.UPLOAD_URL,{method:'POST',credentials:'include',body:fd}); const j=await r.json(); uploadPath.value=j.path||j.error||'';}else{const b64=await new Promise(res=>{const r=new FileReader(); r.onload=()=>res(r.result); r.readAsDataURL(f);}); const r=await fetch(cfg.UPLOAD_URL,{method:'POST',credentials:'include',headers:{'content-type':'application/json'},body:JSON.stringify({filename:f.name,content:b64})}); const j=await r.json(); uploadPath.value=j.path||j.error||'';}}
loginBtn.onclick=async()=>{loginMsg.textContent='...'; const r=await auth('login',{password:password.value}); if(r.ok) start(); else loginMsg.textContent=r.error||'Грешка'}; logout.onclick=async()=>{await auth('logout'); location.reload()}; newBtn.onclick=()=>openEditor({published:true,featured:false}); cancelBtn.onclick=()=>editor.classList.add('hide'); saveBtn.onclick=save; uploadBtn.onclick=upload;
async function start(){login.classList.add('hide'); app.classList.remove('hide'); logout.classList.remove('hide'); await load('news');}
(async()=>{try{const s=await auth('session'); if(s.authenticated) start();}catch(e){loginMsg.textContent='Backend не е достапен: '+e.message}})();
</script></body></html>
