backend:
  name: git-gateway
  branch: main

local_backend: true
publish_mode: editorial_workflow
locale: mk
site_url: /
display_url: /
logo_url: /assets/fgsm-admin-logo.svg
media_folder: assets/uploads
public_folder: /assets/uploads

collections:
  - name: homepage
    label: Почетна страница
    files:
      - name: settings
        label: Почетна, цели и контакт
        file: content/settings.json
        format: json
        fields:
          - label: Hero секција
            name: hero
            widget: object
            fields:
              - {label: Наднаслов, name: eyebrow, widget: string}
              - {label: Главен наслов — прв дел, name: title_before, widget: string}
              - {label: Нагласен дел од насловот, name: title_highlight, widget: string}
              - {label: Поднаслов, name: subtitle, widget: text}
              - {label: Прво копче — текст, name: primary_label, widget: string}
              - {label: Прво копче — route ID, name: primary_route, widget: string, hint: "Пример: branches"}
              - {label: Второ копче — текст, name: secondary_label, widget: string}
              - {label: Второ копче — anchor ID, name: secondary_anchor, widget: string, hint: "Пример: calendar"}
              - {label: Значка — наслов, name: badge_title, widget: string}
              - {label: Значка — текст, name: badge_text, widget: string}
              - label: Показатели
                name: stats
                widget: list
                min: 1
                max: 6
                summary: "{{fields.value}} — {{fields.label}}"
                fields:
                  - {label: Вредност, name: value, widget: string}
                  - {label: Опис, name: label, widget: string}
          - label: Истакната активност
            name: featured
            widget: object
            fields:
              - {label: Наднаслов, name: eyebrow, widget: string}
              - {label: Наслов, name: title, widget: string}
              - {label: Опис, name: text, widget: text}
              - {label: Прво копче — текст, name: primary_label, widget: string}
              - {label: Прво копче — anchor ID, name: primary_anchor, widget: string}
              - {label: Второ копче — текст, name: secondary_label, widget: string}
              - {label: Второ копче — route ID, name: secondary_route, widget: string}
              - {label: Голем број / година, name: visual_number, widget: string}
          - label: Календар — наслови
            name: calendar
            widget: object
            fields:
              - {label: Наднаслов, name: eyebrow, widget: string}
              - {label: Наслов, name: title, widget: string}
              - {label: Воведен текст, name: intro, widget: text}
          - label: Новости — наслови
            name: news
            widget: object
            fields:
              - {label: Наднаслов, name: eyebrow, widget: string}
              - {label: Наслов, name: title, widget: string}
          - label: Цели на Федерацијата
            name: goals
            widget: object
            fields:
              - {label: Слоган — прв дел, name: slogan_before, widget: string}
              - {label: Слоган — нагласен дел, name: slogan_highlight, widget: string}
              - {label: Слоган — последен дел, name: slogan_after, widget: string}
              - {label: Наднаслов, name: eyebrow, widget: string}
              - {label: Наслов, name: title, widget: string}
              - {label: Вовед, name: intro, widget: text}
              - label: Цели
                name: items
                widget: list
                field: {label: Цел, name: item, widget: string}
          - label: Контакт
            name: contact
            widget: object
            fields:
              - {label: Е-пошта, name: email, widget: string}
              - {label: Телефон, name: phone, widget: string}
              - {label: Локација, name: location, widget: string}
              - {label: Facebook URL, name: facebook, widget: string, required: false}
              - {label: Instagram URL, name: instagram, widget: string, required: false}
              - {label: YouTube URL, name: youtube, widget: string, required: false}
          - {label: Белешка за партнери, name: partners_note, widget: text}

  - name: publishing
    label: Објавување содржина
    files:
      - name: news
        label: Новости
        file: content/news.json
        format: json
        fields:
          - label: Објави
            name: items
            widget: list
            summary: "{{fields.date}} — {{fields.title}}"
            fields:
              - {label: Slug, name: slug, widget: string, pattern: ['^[a-z0-9-]+$', 'Само мали латинични букви, бројки и цртички']}
              - {label: Објавено, name: published, widget: boolean, default: true}
              - {label: Истакната објава, name: featured, widget: boolean, default: false}
              - {label: Датум, name: date, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, format: 'YYYY-MM-DD'}
              - {label: Категорија, name: category, widget: string}
              - label: Гранка
                name: branch
                widget: select
                default: all
                options:
                  - {label: Сите / Федерација, value: all}
                  - {label: МСГ, value: msg}
                  - {label: ЖСГ, value: zsg}
                  - {label: РГ, value: rg}
                  - {label: ПК, value: pk}
                  - {label: Гимнастика за сите, value: gfa}
              - {label: Наслов, name: title, widget: string}
              - {label: Краток опис, name: excerpt, widget: text}
              - {label: Целосен текст, name: body, widget: text, hint: "Користете празен ред за нов пасус, ## за поднаслов и - за листа."}
              - {label: Главна фотографија, name: image, widget: image, required: false}
              - {label: Alt текст на фотографијата, name: image_alt, widget: string, required: false}

      - name: events
        label: Календар и натпревари
        file: content/events.json
        format: json
        fields:
          - label: Настани
            name: items
            widget: list
            summary: "{{fields.start_date}} — {{fields.name}}"
            fields:
              - {label: Slug, name: slug, widget: string, pattern: ['^[a-z0-9-]+$', 'Само мали латинични букви, бројки и цртички']}
              - {label: Објавено, name: published, widget: boolean, default: true}
              - {label: Истакнат настан, name: featured, widget: boolean, default: false}
              - label: Гранка
                name: branch
                widget: select
                options:
                  - {label: МСГ, value: msg}
                  - {label: ЖСГ, value: zsg}
                  - {label: РГ, value: rg}
                  - {label: ПК, value: pk}
                  - {label: Гимнастика за сите, value: gfa}
              - {label: Почетен датум, name: start_date, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, format: 'YYYY-MM-DD'}
              - {label: Краен датум, name: end_date, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, format: 'YYYY-MM-DD', required: false}
              - {label: Приказ на датум, name: date_label, widget: string, required: false, hint: "Оставете празно за автоматски формат."}
              - {label: Име на настанот, name: name, widget: string}
              - {label: Категорија, name: category, widget: string}
              - {label: Тип на настан, name: type, widget: string}
              - {label: Локација, name: location, widget: string}
              - {label: Организатор, name: organizer, widget: string, required: false}
              - {label: Опис, name: description, widget: text, required: false}
              - {label: Билтен / PDF, name: bulletin, widget: file, required: false}
              - {label: Линк за пријава, name: registration_url, widget: string, required: false}
              - {label: Линк до резултати, name: results_url, widget: string, required: false}

      - name: results
        label: Резултати
        file: content/results.json
        format: json
        fields:
          - label: Резултати
            name: items
            widget: list
            summary: "{{fields.date}} — {{fields.title}}"
            fields:
              - {label: Објавено, name: published, widget: boolean, default: true}
              - {label: Истакнато, name: featured, widget: boolean, default: false}
              - {label: Датум, name: date, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, format: 'YYYY-MM-DD'}
              - label: Гранка
                name: branch
                widget: select
                options:
                  - {label: МСГ, value: msg}
                  - {label: ЖСГ, value: zsg}
                  - {label: РГ, value: rg}
                  - {label: ПК, value: pk}
                  - {label: Гимнастика за сите, value: gfa}
              - {label: Наслов, name: title, widget: string}
              - {label: Тип на натпревар, name: competition_type, widget: string}
              - {label: Категорија, name: category, widget: string}
              - {label: Локација, name: location, widget: string}
              - {label: Краток преглед, name: summary, widget: text, required: false}
              - {label: PDF со резултати, name: file, widget: file}

      - name: documents
        label: Документи и правилници
        file: content/documents.json
        format: json
        fields:
          - label: Документи
            name: items
            widget: list
            summary: "{{fields.category}} — {{fields.title}}"
            fields:
              - {label: Објавено, name: published, widget: boolean, default: true}
              - {label: Истакнат документ, name: featured, widget: boolean, default: false}
              - {label: Наслов, name: title, widget: string}
              - {label: Route ID, name: route, widget: string, default: documents, hint: "Пример: documents или branches/msg/documents. Видете ROUTE-CATALOG.md."}
              - label: Гранка
                name: branch
                widget: select
                default: all
                options:
                  - {label: Сите / Федерација, value: all}
                  - {label: МСГ, value: msg}
                  - {label: ЖСГ, value: zsg}
                  - {label: РГ, value: rg}
                  - {label: ПК, value: pk}
                  - {label: Гимнастика за сите, value: gfa}
              - {label: Категорија, name: category, widget: string}
              - {label: Верзија, name: version, widget: string, required: false}
              - {label: Датум, name: date, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, format: 'YYYY-MM-DD'}
              - {label: Опис, name: description, widget: text, required: false}
              - {label: PDF / датотека, name: file, widget: file}

      - name: people
        label: Луѓе, тимови и тела
        file: content/people.json
        format: json
        fields:
          - label: Лица
            name: items
            widget: list
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - {label: Активно, name: active, widget: boolean, default: true}
              - {label: Име и презиме, name: name, widget: string}
              - {label: Функција, name: role, widget: string}
              - label: Група
                name: group
                widget: select
                options:
                  - {label: Раководство, value: leadership}
                  - {label: Управен одбор / тело, value: board}
                  - {label: Национален тим, value: national-team}
                  - {label: Тренер, value: coach}
                  - {label: Судија / судијка, value: judge}
                  - {label: Стручен кадар, value: staff}
              - label: Гранка
                name: branch
                widget: select
                default: all
                options:
                  - {label: Сите / Федерација, value: all}
                  - {label: МСГ, value: msg}
                  - {label: ЖСГ, value: zsg}
                  - {label: РГ, value: rg}
                  - {label: ПК, value: pk}
                  - {label: Гимнастика за сите, value: gfa}
              - {label: Route ID, name: route, widget: string, required: false, hint: "Пример: branches/msg/national-team"}
              - {label: Клуб / организација, name: club, widget: string, required: false}
              - {label: Мандат / период, name: mandate, widget: string, required: false}
              - {label: Кратка биографија, name: bio, widget: text, required: false}
              - {label: Фотографија, name: photo, widget: image, required: false}
              - {label: Редослед, name: order, widget: number, value_type: int, default: 10}

      - name: gallery
        label: Галерија
        file: content/gallery.json
        format: json
        fields:
          - label: Фотографии
            name: items
            widget: list
            summary: "{{fields.date}} — {{fields.title}}"
            fields:
              - {label: Објавено, name: published, widget: boolean, default: true}
              - {label: Истакната, name: featured, widget: boolean, default: false}
              - {label: Наслов, name: title, widget: string}
              - {label: Датум, name: date, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, format: 'YYYY-MM-DD'}
              - label: Гранка
                name: branch
                widget: select
                default: all
                options:
                  - {label: Сите / Федерација, value: all}
                  - {label: МСГ, value: msg}
                  - {label: ЖСГ, value: zsg}
                  - {label: РГ, value: rg}
                  - {label: ПК, value: pk}
                  - {label: Гимнастика за сите, value: gfa}
              - {label: Категорија, name: category, widget: string}
              - {label: Фотографија, name: image, widget: image}
              - {label: Alt текст, name: alt, widget: string}
              - {label: Опис, name: caption, widget: text, required: false}

      - name: partners
        label: Партнери и спонзори
        file: content/partners.json
        format: json
        fields:
          - label: Партнери
            name: items
            widget: list
            summary: "{{fields.name}}"
            fields:
              - {label: Активен, name: active, widget: boolean, default: true}
              - {label: Име, name: name, widget: string}
              - {label: Тип, name: type, widget: string, required: false}
              - {label: Лого, name: logo, widget: image, required: false}
              - {label: Веб-страница, name: url, widget: string, required: false}
              - {label: Редослед, name: order, widget: number, value_type: int, default: 10}

      - name: social
        label: Социјални објави
        file: content/social.json
        format: json
        fields:
          - label: Објави / линкови
            name: items
            widget: list
            summary: "{{fields.platform}} — {{fields.title}}"
            fields:
              - {label: Активно, name: active, widget: boolean, default: true}
              - {label: Платформа, name: platform, widget: select, options: [Instagram, Facebook, YouTube, Друго]}
              - {label: Текст, name: title, widget: text}
              - {label: Линк, name: url, widget: string, required: false}
              - {label: Фотографија, name: image, widget: image, required: false}

      - name: pages
        label: Содржина на сите внатрешни страници
        file: content/pages.json
        format: json
        fields:
          - label: Страници
            name: items
            widget: list
            summary: "{{fields.route}} — {{fields.title}}"
            fields:
              - {label: Објавено, name: published, widget: boolean, default: true}
              - {label: Route ID, name: route, widget: string, hint: "Мора точно да одговара на ID од ROUTE-CATALOG.md, пример branches/msg/general."}
              - {label: Наслов, name: title, widget: string}
              - {label: Краток опис, name: summary, widget: text}
              - {label: Главна содржина, name: body, widget: text, hint: "Празен ред = нов пасус, ## = поднаслов, - = листа."}
              - {label: Наслов на истакната рамка, name: callout_title, widget: string, required: false}
              - {label: Текст на истакната рамка, name: callout_text, widget: text, required: false}
              - {label: Датум на ажурирање, name: updated, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, format: 'YYYY-MM-DD', required: false}
